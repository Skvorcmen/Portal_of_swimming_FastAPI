{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-body">
                <h1>{{ news.title }}</h1>
                <p class="text-muted">
                    {{ news.published_at.strftime('%d.%m.%Y') if news.published_at else 'Черновик' }}
                </p>
                <hr>
                <div class="mt-3">
                    {{ news.content | safe }}
                </div>
                <div class="mt-4">
                    <a href="/news/page" class="btn btn-secondary">← Назад к новостям</a>
                    
                    {% if current_user and current_user.role == 'admin' %}
                    <button onclick="deleteNews({{ news.id }})" class="btn btn-danger float-end">
                        <i class="fas fa-trash"></i> Удалить
                    </button>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function deleteNews(newsId) {
    if (confirm('Удалить эту новость?')) {
        const token = document.cookie.match(/access_token=([^;]+)/)?.[1];
        fetch(`/news/${newsId}`, {
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        }).then(() => {
            window.location.href = '/news/page';
        });
    }
}
</script>
{% endblock %}
